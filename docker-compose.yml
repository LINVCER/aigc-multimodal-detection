version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: imagenious-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-image_nious}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: imagenious-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: imagenious-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imagenious-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-root}:${MYSQL_PASSWORD:-123456}@mysql:3306/${MYSQL_DATABASE:-image_nious}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./models:/models

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imagenious-celery
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-root}:${MYSQL_PASSWORD:-123456}@mysql:3306/${MYSQL_DATABASE:-image_nious}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./models:/models

volumes:
  mysql_data:
  redis_data:
  minio_data:
